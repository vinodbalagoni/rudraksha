<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8">
    <title>Rudraksha Enterprises - Redirecting...</title>
    <script type="text/javascript">
      // Single Page Apps for GitHub Pages
      // This script takes the current url and converts the path and query string into just a query string,
      // then redirects the browser to the new url with only a query string and hash.
      // E.g. https://domain.com/about becomes https://domain.com/?/about
      var pathSegmentsToKeep = 0;

      var l = window.location;
      l.replace(
        l.protocol + '//' + l.hostname + (l.port ? ':' + l.port : '') +
        l.pathname.split('/').slice(0, 1 + pathSegmentsToKeep).join('/') +
        '/?/' +
        l.pathname.slice(1).split('/').slice(pathSegmentsToKeep).join('/').replace(/&/g, '~and~') +
        (l.search ? '&' + l.search.slice(1).replace(/&/g, '~and~') : '') +
        l.hash
      );
    </script>
  </head>
  <body>
    <div style="font-family: sans-serif; text-align: center; margin-top: 50px;">
      <h2>Redirecting to Rudraksha Enterprises...</h2>
      <p>If you are not redirected automatically, please click <a href="/">here</a>.</p>
    </div>
  </body>
</html>
